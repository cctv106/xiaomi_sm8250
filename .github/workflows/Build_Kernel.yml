name: Kernel Builder

on:
  workflow_dispatch:
    inputs:
      target_devices:
        description: 'Target device(s)'
        required: true
        default: 'munch'
        type: choice
        options:
          - 'munch'
          - 'lmi'
          - 'umi'
          - 'psyche'
          - 'thyme'
          - 'cmi'
          - 'cas'
          - 'apollo'
          - 'alioth'
          - 'elish'
          - 'enuma'
          - 'dagu'
          - 'pipa'
          - 'all'

      system_version:
        description: 'Target System'
        required: true
        type: choice
        default: 'miui'
        options:
          - 'aosp'
          - 'miui'
          - 'all'

      kernelsu_version:
        description: 'KernelSU Version'
        required: true
        type: choice
        default: 'ksu'
        options:
          - 'ksu'
          - 'rksu'
          - 'sukisu'
          - 'sukisu-ultra'
          - 'noksu'

      additional_function:
        description: 'Additional Functions'
        required: true
        type: choice
        default: 'no'
        options:
          - 'susfs'
          - 'kpm'
          - 'susfs-kpm'
          - 'no'

      # 自定义版本标识参数
      ksu_meta:
        description: '分支名/自定义版本标识 (仅用于 sukisu-ultra)'
        required: false
        default: '酷安@宝明v'  # 设置为"酷安@宝明v"
        type: string

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          DEVICES="${{ github.event.inputs.target_devices }}"
          if [ "$DEVICES" == "all" ]; then
            DEVICES="munch,lmi,umi,psyche,thyme,cmi,cas,apollo,alioth,elish,enuma,dagu,pipa"
          fi
          DEVICES_JSON="[\"$(echo $DEVICES | sed 's/,/\",\"/g')\"]"
          echo "matrix={\"device\":$DEVICES_JSON}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.prepare.outputs.matrix)}}
      fail-fast: false
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential git curl wget bison flex zip bc cpio libssl-dev libncurses-dev gcc python3 python3-pip ccache

      - name: Clean workspace
        run: |
          rm -rf out/ AnyKernel3*.zip Kernel_*.zip
          ccache -C
          rm -rf *.o *.mod *.order *.symvers *.cmd
          rm -rf toolchain/proton-clang
          echo "Cleaned workspace"

      - name: Cache Proton Clang
        uses: actions/cache@v4
        id: clang-cache
        with:
          path: toolchain/proton-clang
          key: ${{ runner.os }}-proton-clang-20210522

      - name: Download Toolchain
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain
          cd toolchain
          wget https://github.com/kdrag0n/proton-clang/archive/refs/tags/20210522.zip
          unzip 20210522.zip
          mv proton-clang-20210522 proton-clang
          rm proton-clang/bin/ld 20210522.zip

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          key: ${{ runner.os }}-ccache-${{ matrix.device }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-ccache-${{ matrix.device }}-

      - name: Customize KernelSU Version (for sukisu-ultra)
        if: ${{ github.event.inputs.kernelsu_version == 'sukisu-ultra' }}
        run: |
          echo "应用自定义版本处理..."
          META="${{ github.event.inputs.ksu_meta }}"
          # 使用中文符号处理
          if [[ "$META" == *"@"* ]]; then
            BRANCH_NAME="${META%%@*}"
            CUSTOM_TAG="${META#*@}"
          else
            BRANCH_NAME="${META%%/*}"
            CUSTOM_TAG="${META#*/}"
          fi
          echo "分支名: $BRANCH_NAME"
          echo "自定义版本标识: $CUSTOM_TAG"

          # 克隆 SukiSU-Ultra
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git -b "$BRANCH_NAME" SukiSU-Ultra
          cd SukiSU-Ultra/kernel
          
          # 设置内核版本
          KSU_API_VERSION=$(grep "KSU_VERSION_API :=" Makefile | awk -F'= ' '{print $2}')
          [[ -z "$KSU_API_VERSION" ]] && KSU_API_VERSION="3.1.7"
          
          KSU_VERSION_FULL="v$KSU_API_VERSION-$CUSTOM_TAG@$BRANCH_NAME"
          echo "KSU_VERSION_FULL=$KSU_VERSION_FULL" >> $GITHUB_ENV
          
          # 修改 Makefile
          sed -i '/KSU_VERSION_API :=/d' Makefile
          sed -i '/KSU_VERSION_FULL :=/d' Makefile
          echo "KSU_VERSION_API := $KSU_API_VERSION" >> Makefile
          echo "KSU_VERSION_FULL := $KSU_VERSION_FULL" >> Makefile
          
          echo "::group::最终 Makefile 预览"
          grep -A5 "KSU_VERSION_API" Makefile
          echo "::endgroup::"
          
          # 返回工作目录
          cd ../..
          
          # 设置版本变量供后续使用
          KSU_VERSION=$(expr $(git rev-list --count HEAD 2>/dev/null || echo 13000) + 10700)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

      - name: Build Kernel
        run: |
          sed -i "s|TOOLCHAIN_PATH=\$HOME/toolchain/proton-clang/bin|TOOLCHAIN_PATH=$(pwd)/toolchain/proton-clang/bin|" build.sh
          
          # 传递 KSU 版本信息给构建脚本
          EXTRA_ARGS=""
          if [ -n "$KSUVER" ]; then
            EXTRA_ARGS="--ksu-ver $KSUVER"
          fi
          
          bash build.sh "${{ matrix.device }}" "${{ github.event.inputs.kernelsu_version }}" "${{ github.event.inputs.additional_function }}" "${{ github.event.inputs.system_version }}" $EXTRA_ARGS

      - name: Generate Device Name Mapping
        id: device_mapping
        run: |
          declare -A device_map=(
            ["psyche"]="Mi12X" ["thyme"]="Mi10S" ["umi"]="Mi10" ["munch"]="K40S"
            ["lmi"]="K30Pro" ["cmi"]="Mi10Pro" ["cas"]="Mi10Ultra" ["apollo"]="Mi10T-K30SUltra"
            ["alioth"]="Mi11X-K40" ["elish"]="XiaomiPad5Pro" ["enuma"]="XiaomiPad5Pro5G"
            ["dagu"]="XiaomiPad5Pro12.4" ["pipa"]="XiaomiPad6"
          )
          DEVICE="${{ matrix.device }}"
          echo "device_name=${device_map[$DEVICE]}" >> $GITHUB_OUTPUT
          echo "DEVICE_NAME=${device_map[$DEVICE]}" >> $GITHUB_ENV

      - name: Find and Rename Kernel ZIP
        run: |
          ZIP_FILE=$(find . -name "Kernel_*_${{ matrix.device }}_*.zip" -print -quit)
          if [ -z "$ZIP_FILE" ]; then
            ZIP_FILE=$(find . -name "AnyKernel3_${{ matrix.device }}*.zip" -print -quit)
          fi
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::No kernel file found for ${{ matrix.device }}!"
            exit 1
          fi
          DEVICE_NAME="${{ env.DEVICE_NAME }}"
          NEW_NAME="AnyKernel3-$DEVICE_NAME.zip"
          
          # 添加 KSU 版本到文件名
          if [ -n "$KSUVER" ]; then
            NEW_NAME="AnyKernel3-$DEVICE_NAME-KSU$KSUVER.zip"
          fi
          
          mv "$ZIP_FILE" "$NEW_NAME"
          echo "ZIP_PATH=$(pwd)/$NEW_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE_NAME }}${{ env.KSUVER && format('-KSU{0}', env.KSUVER) || '' }}
          path: ${{ env.ZIP_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Prepare Release Files
        run: |
          mkdir release
          find artifacts -name '*.zip' -exec cp {} release \;
          
      - name: Set Release Info
        id: release_info
        run: |
          DEVICE_NAMES=$(ls release | cut -d'-' -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "device_names=$DEVICE_NAMES" >> $GITHUB_OUTPUT
          
          # 添加 KSU 版本信息
          KSU_INFO=""
          if [ -n "${{ github.event.inputs.ksu_meta }}" ]; then
            KSU_INFO="\n- **自定义版本标识**: ${{ github.event.inputs.ksu_meta }}"
          fi
          
          echo "RELEASE_BODY=## SukiSU-Ultra 内核构建\n- **设备:** $DEVICE_NAMES\n- **系统:** ${{ github.event.inputs.system_version }}\n- **KernelSU 版本:** ${{ github.event.inputs.kernelsu_version }}$KSU_INFO\n- **构建日期:** $(date +%Y-%m-%d)\n- **版本标识:** ${{ github.event.inputs.ksu_meta || '酷安@宝明v' }}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: AnyKernel3_${{ steps.release_info.outputs.device_names }}
          tag_name: kernel-${{ github.run_id }}
          body: ${{ env.RELEASE_BODY }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Clean workspace
        if: ${{ always() }}
        run: |
          rm -rf artifacts release
          echo "Cleaned workspace after release"
